spring.application.name=ca.sheridancollege
server.port=${PORT:8080}
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
spring.data.mongodb.uri=${MONGODB_URI}
jwt.secret=${JWT_SECRET:VGhpcyBpcyBhIHNIY3JldCBrZXkgLSBpdCBzaG91bGQgYmUgb3JpZ2luYWwgLSBhbmQgb2YgYSBkZWNlbnQgbGVuZ3Ro}

# OpenWeatherMap API
OPENWEATHER_API_KEY=${OPENWEATHER_API_KEY}

# Gemini API (aistudio.google.com)
gemini.api.key=${GEMINI_API_KEY}
gemini.api.url=https://generativelanguage.googleapis.com/v1beta

# Email (SMTP)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Twilio SMS
twilio.account.sid=${TWILIO_ACCOUNT_SID}
twilio.auth.token=${TWILIO_AUTH_TOKEN}
twilio.phone.number=${TWILIO_PHONE_NUMBER}

# Debug: log all registered endpoints and security filter decisions
logging.level.org.springframework.web.servlet.mvc.method.annotation.RequestMappingHandlerMapping=trace
logging.level.org.springframework.security.web.FilterChainProxy=debug
logging.level.org.springframework.security=debug
