spring.application.name=ca.sheridancollege
server.port=${PORT:8080}
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
upload.path=uploads/wardrobe

spring.data.mongodb.uri=${MONGODB_URI}
jwt.secret=${JWT_SECRET}
ai.service.url=${AI_SERVICE_URL:http://127.0.0.1:5000}

# Gemini API (aistudio.google.com)
gemini.api.key=${GEMINI_API_KEY}
gemini.api.url=https://generativelanguage.googleapis.com/v1beta
